<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Investment Dashboard</title>
  <style>
    :root {
      --bg: #0d1117;
      --card: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #58a6ff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
    .container { max-width: 1100px; margin: 0 auto; padding: 2rem; }
    header { margin-bottom: 2.5rem; border-bottom: 1px solid var(--border); padding-bottom: 1.5rem; }
    h1 { color: var(--accent); font-size: 2rem; margin-bottom: 0.5rem; }
    .subtitle { color: var(--text-muted); font-size: 0.9rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.5rem; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 1.5rem; transition: border-color 0.2s; }
    .card:hover { border-color: var(--accent); }
    .card a { text-decoration: none; color: var(--text); display: block; height: 100%; }
    .card h2 { font-size: 1.1rem; margin-bottom: 0.5rem; color: var(--accent); }
    .card p { font-size: 0.85rem; color: var(--text-muted); }
    .tag { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 4px; font-size: 0.7rem; font-weight: 600; margin-top: 0.75rem; }
    .tag-weekly { background: rgba(88,166,255,0.15); color: var(--accent); }
    .tag-live { background: rgba(63,185,80,0.15); color: #3fb950; }
    footer { margin-top: 3rem; text-align: center; color: var(--text-muted); font-size: 0.75rem; border-top: 1px solid var(--border); padding-top: 1rem; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Investment Dashboard</h1>
      <p class="subtitle">Real-time indicators + AI commentary</p>
    </header>
    <div class="grid">
      <div class="card">
        <a href="weekly/">
          <h2>美元流动性周报</h2>
          <p>Dollar Liquidity Theory v3.1 · 每周更新</p>
          <span class="tag tag-weekly">Weekly Report</span>
        </a>
      </div>
      <div class="card">
        <a href="#">
          <h2>主要指标</h2>
          <p>SOFR · TED · DXY · T10Y2Y · M2 · 净流动性</p>
          <span class="tag tag-live">Live Data</span>
        </a>
      </div>
      <div class="card">
        <a href="#">
          <h2>AI 点评</h2>
          <p>MiniMax 智能分析 · 市场情绪解读</p>
          <span class="tag tag-weekly">Coming Soon</span>
        </a>
      </div>
    </div>
    <footer>
      <p>Data: FRED (Federal Reserve Economic Data) | AI: MiniMax</p>
    </footer>
  </div>
</body>
</html>
