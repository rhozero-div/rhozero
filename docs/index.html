<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RhoZero</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0f;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
      padding: 40px;
      max-width: 600px;
    }

    .logo {
      font-size: 48px;
      font-weight: 800;
      letter-spacing: -2px;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .tagline {
      font-size: 14px;
      color: #666;
      margin-bottom: 48px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .status {
      display: inline-block;
      padding: 6px 16px;
      border: 1px solid #3a3a4a;
      border-radius: 20px;
      font-size: 12px;
      color: #888;
      margin-bottom: 40px;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .link-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px;
      background: #111118;
      border: 1px solid #1e1e2a;
      border-radius: 12px;
      text-decoration: none;
      color: #e0e0e0;
      transition: all 0.2s ease;
    }

    .link-card:hover {
      border-color: #667eea;
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(102, 126, 234, 0.1);
    }

    .link-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .link-icon {
      font-size: 24px;
    }

    .link-title {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 2px;
    }

    .link-desc {
      font-size: 12px;
      color: #666;
    }

    .link-arrow {
      color: #444;
      font-size: 18px;
    }

    .footer {
      margin-top: 48px;
      font-size: 11px;
      color: #333;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">RhoZero</div>
    <div class="tagline">Investment Intelligence</div>
    <div class="status">⚙ Under Construction</div>

    <div class="links">
      <a href="dollar-liquidity-weekly-report/" class="link-card">
        <div class="link-left">
          <span class="link-icon">📊</span>
          <div>
            <div class="link-title">Dollar Liquidity Weekly Report</div>
            <div class="link-desc">Weekly liquidity analysis · L1–L5 rating system</div>
          </div>
        </div>
        <span class="link-arrow">→</span>
      </a>

      <a href="implementation/" class="link-card">
        <div class="link-left">
          <span class="link-icon">🖥</span>
          <div>
            <div class="link-title">Implementation Dashboard</div>
            <div class="link-desc">Daily indicators · AI commentary · Chart.js</div>
          </div>
        </div>
        <span class="link-arrow">→</span>
      </a>
    </div>

    <div class="footer">
      rhozero-div.github.io/rhozero
    </div>
  </div>
</body>
</html>
